<style>

    --line: #D8D2C2;
    --accent: #3E5C4E;
    --accent-soft: #E4EEE8;
    --warn: #A65D3E;
    --warn-soft: #F3E4DC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  .wrap { width: 100%; max-width: 480px; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0;
  }
  .overall-label {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    margin: -14px 0 20px;
  }
  .count {
    font-size: 13px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .progress-track {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 28px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 18px;
    box-shadow: 0 1px 2px rgba(43,42,40,0.04);
    cursor: pointer;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .jp {
    font-size: 21px;
    line-height: 1.6;
    font-weight: 600;
  }
  .en {
    font-size: 19px;
    line-height: 1.55;
    color: var(--accent);
    font-weight: 600;
    display: none;
  }
  .en.shown { display: block; }
  .hint {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }
  button {
    flex: 1;
    padding: 15px 8px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-again {
    background: var(--warn-soft);
    color: var(--warn);
  }
  .btn-good {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .btn-reveal {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    margin-top: 22px;
    padding: 14px;
    border-radius: 10px;
  }
  .done {
    text-align: center;
    padding: 60px 20px;
  }
  .done h2 { font-size: 19px; margin-bottom: 8px; }
  .done p { color: var(--ink-soft); font-size: 14px; }
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 22px;
    line-height: 1.6;
  }
  .status-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 14px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-new { background: var(--ink-soft); }
  .dot-again { background: var(--warn); }
  .dot-good { background: var(--accent); }
</style>
</head>

["もし状況が変わったら、教えてください。","If the situation changes, please let me know."],
["彼女は将来に備えて準備を進めています。","She is preparing for the future."],
["私はもう少し早く決断すべきでした。","I should have made the decision a little sooner."],
["もしその提案が通れば、大きな前進です。","If that proposal is accepted, it will be a big step forward."],
["彼はその目標を達成するために計画を立てています。","He is making a plan to achieve that goal."],
["私はその件について前向きに検討しています。","I am considering that matter positively."]
];

const STORAGE_KEY = "flashcard-progress-500";
const META_KEY = "flashcard-meta-500";
const NEW_CARDS_PER_DAY = 7;
let progress = null;
let meta = null;
let queue = [];
let currentIndex = 0;
let revealed = false;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
}

function initProgress() {
  const p = {};
  SENTENCES.forEach((_, i) => {
    p[i] = { box: 0, introduced: true };
  });
  return p;
}

function initMeta() {
  return { introducedCount: 0, lastIntroDate: null };
}

async function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    progress = raw ? JSON.parse(raw) : initProgress();
  } catch (e) {
    progress = initProgress();
  }
  try {
    const rawMeta = localStorage.getItem(META_KEY);
    meta = rawMeta ? JSON.parse(rawMeta) : initMeta();
  } catch (e) {
    meta = initMeta();
  }
}

async function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    localStorage.setItem(META_KEY, JSON.stringify(meta));
  } catch (e) {
    console.error("save failed", e);
  }
}

function introduceNewCardsIfNeeded() {
  const today = todayStr();
  if (meta.lastIntroDate === null) {
    // first ever run
    introduceBatch(NEW_CARDS_PER_DAY);
    meta.lastIntroDate = today;
    return;
  }
  if (meta.lastIntroDate !== today) {
    // at least one new day has passed since last visit; introduce one day's worth
    // (kept simple: always exactly one batch per new session on a new day,
    // so returning after several days off doesn't dump a huge backlog at once)
    introduceBatch(NEW_CARDS_PER_DAY);
    meta.lastIntroDate = today;
  }
}

function introduceBatch(count) {
  let introduced = 0;
  for (let i = 0; i < SENTENCES.length && introduced < count; i++) {
    if (!progress[i].introduced) {
      progress[i].introduced = true;
      meta.introducedCount++;
      introduced++;
    }
  }
}

function buildQueue() {
  // Only cards already introduced, and not yet mastered (box < 2), enter today's queue.
  queue = [];
  SENTENCES.forEach((_, i) => {
    if (progress[i].introduced && progress[i].box < 2) queue.push(i);
  });
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
}

function renderStatusRow() {
  let mastered = 0;
  Object.values(progress).forEach(p => { if (p.box >= 2) mastered++; });
  const label = document.getElementById("masteredLabel");
  if (label) label.textContent = `習得済み ${mastered} / ${SENTENCES.length}`;
}

function renderCard() {
  const area = document.getElementById("cardArea");

  if (currentIndex >= queue.length) {
    buildQueue();
    currentIndex = 0;
    if (queue.length === 0) {
      // everything mastered — just loop through all 500 again
      queue = SENTENCES.map((_, i) => i);
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
    }
  }

  const idx = queue[currentIndex];
  const [jp, en] = SENTENCES[idx];
  revealed = false;

  area.innerHTML = `
    <div class="card" id="cardEl">
      <span class="label">日本語 → 英語</span>
      <div class="jp">${jp}</div>
      <div class="en" id="enText">${en}</div>
      <div class="hint" id="hintText">タップして答えを確認</div>
    </div>
    <div class="actions" id="actionsRow" style="display:none;">
      <button class="btn-again" id="btnAgain">もう一度</button>
      <button class="btn-good" id="btnGood">言えた</button>
    </div>
  `;

  document.getElementById("cardEl").addEventListener("click", reveal);
  renderStatusRow();
}

function reveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById("enText").classList.add("shown");
  document.getElementById("hintText").style.display = "none";
  document.getElementById("actionsRow").style.display = "flex";
  document.getElementById("btnAgain").addEventListener("click", (e) => { e.stopPropagation(); answer(false); });
  document.getElementById("btnGood").addEventListener("click", (e) => { e.stopPropagation(); answer(true); });
}

async function answer(good) {
  const idx = queue[currentIndex];
  if (good) {
    progress[idx].box = Math.min(2, progress[idx].box + 1);
  } else {
    progress[idx].box = 0;
  }
  await saveProgress();
  currentIndex++;
  renderCard();
}

async function init() {
  await loadProgress();
  await saveProgress();
  buildQueue();
  currentIndex = 0;
  renderCard();
}

init();
</script>
